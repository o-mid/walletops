services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: walletops
      POSTGRES_PASSWORD: walletops
      POSTGRES_DB: walletops
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U walletops -d walletops"]
      interval: 2s
      timeout: 5s
      retries: 15
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgres://walletops:walletops@postgres:5432/walletops?sslmode=disable
      JWT_SECRET: dev-only-change-me
      WEBHOOK_SECRET: dev-webhook-secret
      AI_PROVIDER: mock
      AI_API_KEY: ""
      HTTP_ADDR: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
